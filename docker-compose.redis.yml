# Mockifyr with durable Redis persistence. Run:
#
#   docker compose -f docker-compose.redis.yml up
#
# Stubs created via the admin API or dashboard are written through to a Redis hash, so they survive a
# mockifyr restart (unlike the default in-memory mode). --change-feed keeps multiple instances
# coherent. Data lives in the `redisdata` volume; `docker compose -f docker-compose.redis.yml down -v`
# wipes it.

services:
  mockifyr:
    image: ghcr.io/omercelikdev/mockifyr:latest
    ports:
      - "8080:8080"
    # Appended to the image entrypoint (--port 8080 --dashboard /app/dashboard):
    command:
      - "--redis"
      - "redis:6379"
      - "--change-feed"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  redisdata:
