name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      # Differential tests require Docker to run the Java WireMock oracle; they are added
      # from G0/G1a and run in a dedicated job once the harness exists.
      - name: Test (unit)
        run: dotnet test --no-build -c Release --filter "FullyQualifiedName!~Differential"
