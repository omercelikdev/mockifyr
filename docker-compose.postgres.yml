# Mockifyr with durable PostgreSQL persistence. Run:
#
#   docker compose -f docker-compose.postgres.yml up
#
# Stubs created via the admin API or dashboard are written through to Postgres, so they survive a
# mockifyr restart (unlike the default in-memory mode). --change-feed keeps multiple instances
# coherent. Data lives in the `pgdata` volume; `docker compose -f docker-compose.postgres.yml down -v`
# wipes it.

services:
  mockifyr:
    image: ghcr.io/omercelikdev/mockifyr:latest
    ports:
      - "8080:8080"
    # Appended to the image entrypoint (--port 8080 --dashboard /app/dashboard):
    command:
      - "--postgres"
      - "Host=postgres;Port=5432;Username=mockifyr;Password=mockifyr;Database=mockifyr"
      - "--change-feed"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mockifyr
      POSTGRES_PASSWORD: mockifyr
      POSTGRES_DB: mockifyr
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mockifyr -d mockifyr"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
